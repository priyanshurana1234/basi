<!DOCTYPE html>

<head>
    <link rel="stylesheet" href="./cs.css">
</head>

<body>
    <div class="calculator">
        <input type="text" class="text1" placeholder="0">
        <div>
            <input type="button"  value="AC" onclick="operation(event)">
            <input type="button"  value="DEL" onclick="operation(event)">
            <input type="button"  value="%" onclick="operation(event)">
            <input type="button"  value="/" onclick="operation(event)">

        </div>
        <div>
            <input type="button"  value="7" onclick="operation(event)">
            <input type="button"  value="8" onclick="operation(event)">
            <input type="button"  value="9" onclick="operation(event)">
            <input type="button"  value="*" onclick="operation(event)">

        </div>
        <div>
            <input type="button"  value="4" onclick="operation(event)">
            <input type="button"  value="5" onclick="operation(event)">
            <input type="button"  value="6" onclick="operation(event)">
            <input type="button"  value="-" onclick="operation(event)">
        </div>
        <div>
            <input type="button"  value="1" onclick="operation(event)">
            <input type="button" value="2" onclick="operation(event)">
            <input type="button"  value="3" onclick="operation(event)">
            <input type="button" value="+" onclick="operation(event)">

        </div>
        <div>
            <input type="button"  value="00" onclick="operation(event)">
            <input type="button"  value="0" onclick="operation(event)">
            <input type="button"  value="." onclick="operation(event)">
            <input type="button" value="=" onclick="operation(event)">

        </div>
    </div>
    <script src="./new.js"></script>
</body>
